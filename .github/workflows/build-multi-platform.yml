name: Build Multi-Platform

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Core/**'
      - 'Tools/**'
      - 'Handlers/**'
      - 'Helpers/**'
      - 'Results/**'
      - 'Program.cs'
      - '*.csproj'
      - '*.sln'
      - 'deploy/**'
      - '.github/workflows/build-multi-platform.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Core/**'
      - 'Tools/**'
      - 'Handlers/**'
      - 'Helpers/**'
      - 'Results/**'
      - 'Program.cs'
      - '*.csproj'
      - '*.sln'
      - 'deploy/**'
      - '.github/workflows/build-multi-platform.yml'
  workflow_dispatch:

jobs:
  prepare:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next_version.outputs.version }}
      tag: ${{ steps.next_version.outputs.tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Calculate next version
      id: next_version
      shell: bash
      run: |
        git fetch --prune --tags --force
        latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        version=${latest_tag#v}
        IFS='.' read -r major minor patch <<< "$version"
        # Increment patch version until finding one that doesn't exist
        while true; do
          patch=$((patch + 1))
          candidate="v${major}.${minor}.${patch}"
          if ! git rev-parse "$candidate" >/dev/null 2>&1; then
            break
          fi
          echo "Version $candidate already exists, trying next..."
        done
        echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
        echo "tag=v${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
        echo "Next version: ${major}.${minor}.${patch} (tag: v${major}.${minor}.${patch})"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            script: pwsh deploy/publish.ps1 -Windows
          - os: windows-latest
            platform: iis
            script: pwsh deploy/publish.ps1 -IIS
          - os: ubuntu-latest
            platform: linux-x64
            script: ./deploy/publish.sh linux-x64
          - os: macos-latest
            platform: macos-x64
            script: ./deploy/publish.sh macos-x64
          - os: macos-latest
            platform: macos-arm64
            script: ./deploy/publish.sh macos-arm64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore AsposeMcpServer.csproj
    
    - name: Clean up license files before build (Unix)
      if: runner.os != 'Windows'
      run: |
        # Security: Remove any license files before building to prevent them from being included in artifacts
        if [ -f "Aspose.Total.lic" ]; then
          rm -f "Aspose.Total.lic"
          echo "Removed Aspose.Total.lic for security"
        fi
        # Remove any other license files
        find . -maxdepth 1 -name "*.lic" -type f -delete 2>/dev/null || true
        echo "License files cleaned before build"
      shell: bash
      continue-on-error: true
    
    - name: Clean up license files before build (Windows)
      if: runner.os == 'Windows'
      run: |
        # Security: Remove any license files before building to prevent them from being included in artifacts
        if (Test-Path "Aspose.Total.lic") {
          Remove-Item "Aspose.Total.lic" -Force -ErrorAction SilentlyContinue
          Write-Host "Removed Aspose.Total.lic for security"
        }
        # Remove any other license files
        Get-ChildItem -Path . -Filter "*.lic" -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
        Write-Host "License files cleaned before build"
      shell: pwsh
      continue-on-error: true
    
    - name: Make publish script executable (Unix)
      if: runner.os != 'Windows'
      run: chmod +x deploy/publish.sh
    
    - name: Build and publish
      run: ${{ matrix.script }}
      env:
        VERSION: ${{ needs.prepare.outputs.version }}
    
    - name: Clean up license files from build output (Unix)
      if: runner.os != 'Windows'
      run: |
        # Security: Ensure no license files are included in build artifacts
        find "publish/${{ matrix.platform }}" -name "*.lic" -type f -delete 2>/dev/null || true
        echo "License files removed from build output"
      shell: bash
      continue-on-error: true
    
    - name: Clean up license files from build output (Windows)
      if: runner.os == 'Windows'
      run: |
        # Security: Ensure no license files are included in build artifacts
        Get-ChildItem -Path "publish\${{ matrix.platform }}" -Filter "*.lic" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
        Write-Host "License files removed from build output"
      shell: pwsh
      continue-on-error: true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.platform }}
        path: publish/${{ matrix.platform }}/
        retention-days: 1
        # Security: Artifact only used for job-to-job file transfer
        # Release creation completes before artifact expires
    
    - name: Display build info
      run: |
        echo "Platform: ${{ matrix.platform }}"
        echo "OS: ${{ matrix.os }}"
    
    - name: Display build info (Windows)
      if: runner.os == 'Windows'
      run: dir publish\${{ matrix.platform }}
      shell: cmd
    
    - name: Display build info (Unix)
      if: runner.os != 'Windows'
      run: ls -lh publish/${{ matrix.platform }}

  create-release:
    name: Create Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    # Security: Only create releases for pushes to main/master branches, not for PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    # Prevent concurrent releases to avoid version number conflicts
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
    
    - name: Display structure
      shell: bash
      run: ls -R artifacts
    
    - name: Clean up license files from artifacts
      shell: bash
      run: |
        # Security: Final check to ensure no license files are included in release archives
        find artifacts -name "*.lic" -type f -delete 2>/dev/null || true
        echo "License files removed from artifacts before creating release archives"
      continue-on-error: true
    
    - name: Create release archives
      shell: bash
      run: |
        cd artifacts
        for dir in */; do
          platform=${dir%/}
          case "$platform" in
            windows-*|iis)
              zip -r "../aspose-mcp-server-${platform}.zip" "$dir"
              ;;
            *)
              tar czf "../aspose-mcp-server-${platform}.tar.gz" -C "$dir" .
              ;;
          esac
        done
        cd ..
        ls -lh ./aspose-mcp-server-*
    
    - name: Generate icon.png from SVG
      shell: bash
      run: |
        sudo apt-get install -y librsvg2-bin
        rsvg-convert -w 512 -h 512 docs/favicon.svg -o icon.png

    - name: Install mcpb CLI
      shell: bash
      run: npm install -g --ignore-scripts @anthropic-ai/mcpb@2.1.2

    - name: Pack .mcpb bundles
      shell: bash
      run: |
        # Each pack-mcpb.sh call internally runs `mcpb validate` on the
        # generated manifest.json before zipping, so manifest-schema errors
        # fail this step rather than a separate validate step.
        VERSION="${{ needs.prepare.outputs.version }}"
        chmod +x deploy/pack-mcpb.sh
        ./deploy/pack-mcpb.sh windows-x64   "$VERSION" "server/AsposeMcpServer.exe" '${__dirname}/server/AsposeMcpServer.exe' '["win32"]'
        ./deploy/pack-mcpb.sh linux-x64     "$VERSION" "server/AsposeMcpServer"     '${__dirname}/server/AsposeMcpServer'     '["linux"]'
        ./deploy/pack-mcpb.sh macos-arm64   "$VERSION" "server/AsposeMcpServer"     '${__dirname}/server/AsposeMcpServer'     '["darwin"]'
        ./deploy/pack-mcpb.sh macos-x64     "$VERSION" "server/AsposeMcpServer"     '${__dirname}/server/AsposeMcpServer'     '["darwin"]'

    - name: Inspect .mcpb bundles
      shell: bash
      run: for f in aspose-mcp-server-*.mcpb; do mcpb info "$f"; done

    - name: Create Release with GitHub CLI
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tag_name="${{ needs.prepare.outputs.tag }}"
        release_notes=$(cat <<'EOF'
        自動建置於 commit ${{ github.sha }}

        包含以下平台的執行檔：
        - Windows (x64) — `.zip`
        - Linux (x64) — `.tar.gz`
        - macOS (x64 + ARM64) — `.tar.gz`

        ### macOS 使用說明

        下載 `.tar.gz` 後執行以下指令：

        ```bash
        # 解壓縮
        tar xzf aspose-mcp-server-macos-arm64.tar.gz

        # 移除 macOS 隔離標記（僅需執行一次）
        xattr -d com.apple.quarantine AsposeMcpServer

        # 執行
        ./AsposeMcpServer --word
        ```

        > Intel Mac 請將檔名中的 `arm64` 替換為 `x64`。

        ### Linux 使用說明

        ```bash
        tar xzf aspose-mcp-server-linux-x64.tar.gz
        ./AsposeMcpServer --word
        ```

        ### Claude Desktop 一鍵安裝（.mcpb）

        Claude Desktop 使用者請下載對應平台的 `.mcpb` 檔，雙擊即可原生安裝於主機作業系統（繞過 Linux 沙盒、Windows 路徑可正常使用）。安裝時會提示輸入 Aspose 授權檔；略過則以評估模式執行（文件會帶浮水印）。

        - Windows x64 — `aspose-mcp-server-windows-x64.mcpb`
        - macOS ARM64 — `aspose-mcp-server-macos-arm64.mcpb`
        - macOS x64 — `aspose-mcp-server-macos-x64.mcpb`
        - Linux x64 — `aspose-mcp-server-linux-x64.mcpb`

        ---

        **建置編號：** ${{ github.run_number }}
        **Commit：** ${{ github.sha }}
        EOF
        )

        # 檢查 tag 和 release 是否已存在
        if git rev-parse "$tag_name" >/dev/null 2>&1; then
          echo "Tag $tag_name already exists"
          if gh release view "$tag_name" >/dev/null 2>&1; then
            echo "Release $tag_name already exists, skipping creation"
            exit 0
          else
            echo "Tag exists but release doesn't, creating release for existing tag"
          fi
        fi

        # 使用 GitHub CLI 創建 release（會自動創建 lightweight tag 如果不存在）
        # tag 格式：v1.0.4（符合語義化版本規則，與之前的 tag 格式一致）
        # --target 指定 tag 指向觸發 workflow 的 commit
        gh release create "$tag_name" \
          --title "Release $tag_name" \
          --notes "$release_notes" \
          --target "${{ github.sha }}" \
          aspose-mcp-server-*.zip aspose-mcp-server-*.tar.gz aspose-mcp-server-*.mcpb

        # Output version for downstream jobs
        echo "release_tag=$tag_name" >> $GITHUB_OUTPUT

    - name: Update Homebrew Tap
      shell: bash
      continue-on-error: true
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
          echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew Tap update"
          exit 0
        fi

        tag_name="${{ needs.prepare.outputs.tag }}"
        version="${tag_name#v}"

        # Calculate sha256 for macOS archives
        sha256_arm64=$(sha256sum aspose-mcp-server-macos-arm64.tar.gz | awk '{print $1}')
        sha256_x64=$(sha256sum aspose-mcp-server-macos-x64.tar.gz | awk '{print $1}')

        echo "Version: $version"
        echo "SHA256 ARM64: $sha256_arm64"
        echo "SHA256 X64: $sha256_x64"

        # Clone homebrew-tap repo
        git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/xjustloveux/homebrew-tap.git" homebrew-tap-update
        cd homebrew-tap-update

        # Generate formula
        cat > aspose-mcp-server.rb <<FORMULA
        class AsposeMcpServer < Formula
          desc "MCP server for office document processing powered by Aspose.Total"
          homepage "https://github.com/xjustloveux/aspose-mcp-server"
          license "MIT"

          if Hardware::CPU.arm?
            url "https://github.com/xjustloveux/aspose-mcp-server/releases/download/v${version}/aspose-mcp-server-macos-arm64.tar.gz"
            sha256 "${sha256_arm64}"
          else
            url "https://github.com/xjustloveux/aspose-mcp-server/releases/download/v${version}/aspose-mcp-server-macos-x64.tar.gz"
            sha256 "${sha256_x64}"
          end

          def install
            bin.install "AsposeMcpServer"
          end

          test do
            assert_predicate bin/"AsposeMcpServer", :executable?
          end
        end
        FORMULA

        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add aspose-mcp-server.rb

        if git diff --cached --quiet; then
          echo "No changes to formula"
        else
          git commit -m "Update aspose-mcp-server to ${version}"
          git push
          echo "Homebrew Tap updated to ${version}"
        fi

    outputs:
      release_tag: ${{ needs.prepare.outputs.tag }}

  docker-build-and-push:
    name: Build and Push Docker Image
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.create-release.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.create-release.outputs.release_tag }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.create-release.outputs.release_tag }}
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: ignore
          retention-days: 1

  docker-security-scan:
    name: Docker Security Scan
    needs: [docker-build-and-push, create-release]
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .trivyignore
          sparse-checkout-cone-mode: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.create-release.outputs.release_tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          trivyignores: '.trivyignore'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

